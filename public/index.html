<!doctype html>
<html lang="en" data-api-root="https://smartcardlink-api.onrender.com">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartCardLink - vCard</title>
  <meta name="theme-color" content="#FFD700" />
  <link rel="preconnect" href="https://smartcardlink-api.onrender.com" crossorigin />
  <link rel="dns-prefetch" href="//smartcardlink-api.onrender.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="//res.cloudinary.com" />
  <link rel="dns-prefetch" href="//pub-468c717bb2e44cdaa7a1d57358c2d138.r2.dev" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./libs/fontawesome/all.min.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-bg">
    <main class="vcard" id="vcard">
      <div class="card-surface" id="popup1">
        <div id="brandHeader" class="brand-header">SMARTCARDLINK</div>
        <div class="card-inner popup1-inner">
          <div class="photo-area" id="photoArea"></div>

          <div class="personal-info">
            <div id="fullName" class="full-name"></div>
            <div id="jobName" class="job-name"></div>
            <div id="titlePosition" class="title-position"></div>
          </div>

          <div class="contact-section">
            <div class="contact-box">
              <div class="box-main">
                <div class="contact-label">Phone:</div>
                <div class="contact-primary-wrap">
                  <span id="phoneMain" class="contact-primary"></span>
                  <button id="phoneDropdownBtn" class="dropdown-btn" type="button" aria-expanded="false" aria-controls="phoneList">
                    <i class="fa fa-chevron-down"></i>
                  </button>
                </div>
              </div>
              <div id="phoneList" class="box-list" hidden></div>
            </div>

            <div class="contact-box">
              <div class="box-main">
                <div class="contact-label">Email:</div>
                <div class="contact-primary-wrap">
                  <span id="emailMain" class="contact-primary"></span>
                  <button id="emailDropdownBtn" class="dropdown-btn" type="button" aria-expanded="false" aria-controls="emailList">
                    <i class="fa fa-chevron-down"></i>
                  </button>
                </div>
              </div>
              <div id="emailList" class="box-list" hidden></div>
            </div>
          </div>

          <div class="actions-grid">
            <div class="col">
              <button id="callBtn" class="action-btn" type="button"><i class="fa fa-phone"></i> Call</button>
              <button id="smsBtn" class="action-btn" type="button"><i class="fa fa-comment"></i> Message</button>
              <button id="waBtn" class="action-btn" type="button"><i class="fa-brands fa-whatsapp"></i> Whatsapp</button>
            </div>
            <div class="col">
              <button id="mailBtn" class="action-btn" type="button"><i class="fa fa-envelope"></i> Email</button>
              <button id="printBtn" class="action-btn" type="button"><i class="fa fa-print"></i> Print</button>
              <button id="saveBtn" class="action-btn" type="button"><i class="fa fa-address-card"></i> Save</button>
            </div>
          </div>

          <div class="nav-row">
            <button id="moreInfoBtn" class="more-info-btn" type="button">More Info</button>
          </div>
        </div>
      </div>

      <section id="popup2" class="popup" hidden inert aria-hidden="true">
        <div class="popup-surface popup2-surface">
          <div class="card-inner card-scroll popup2-inner">
            <div class="about-header">
              <div class="about-title">More About Me</div>
              <div class="about-bio-box">
                <div class="bio-label">Bio</div>
                <div id="bioText" class="bio-text"></div>
              </div>
            </div>

            <section id="resumeSection" class="resume-section" hidden>
              <div class="resume-title-row">
                <div class="resume-title-wrap">
                  <div class="resume-title">Professional Resume</div>
                  <div class="resume-subtitle">Secure employer-ready CV access</div>
                </div>
              </div>
              <div class="resume-actions">
                <button id="viewResumeBtn" class="resume-btn" type="button">
                  <i class="fa fa-lock lock-icon"></i>
                  <span>View Resume</span>
                </button>
                <button id="downloadResumeBtn" class="resume-btn secondary" type="button">
                  <i class="fa fa-lock lock-icon"></i>
                  <span>Download Resume</span>
                </button>
              </div>
            </section>

            <section id="resumeLockedSection" class="resume-section locked" hidden>
              <div class="resume-title-row">
                <div class="resume-title-wrap">
                  <div class="resume-title">
                    Professional Resume
                    <span class="pro-lock-badge">
                      <i class="fa fa-lock lock-icon"></i>
                      <span>PRO</span>
                    </span>
                  </div>
                  <div class="resume-subtitle">Available on PRO vCard</div>
                </div>
              </div>
              <div class="resume-actions">
                <button id="viewResumeLockedBtn" class="resume-btn resume-lock-btn" type="button">
                  <i class="fa fa-lock lock-icon"></i>
                  <span>View Resume</span>
                </button>
                <button id="downloadResumeLockedBtn" class="resume-btn secondary resume-lock-btn" type="button">
                  <i class="fa fa-lock lock-icon"></i>
                  <span>Download Resume</span>
                </button>
              </div>
            </section>

            <div class="links-grid-4">
              <div class="links-col">
                <button id="businessWebsite" class="link-btn" type="button">Business URL</button>
                <button id="portfolioWebsite" class="link-btn" type="button">Portfolio URL</button>
              </div>
              <div class="links-col">
                <button id="locationMap" class="link-btn" type="button">Location Map</button>
                <button id="physicalAddress" class="link-btn" type="button">Physical Address</button>
              </div>
            </div>

            <div class="hours-section">
              <table class="hours-table" id="hoursTable">
                <thead><tr><th>Day</th><th>Start</th><th>End</th></tr></thead>
                <tbody></tbody>
              </table>
            </div>

            <button id="bookAppointmentBtn" class="book-btn" type="button"><i class="fa fa-calendar-alt"></i> Book Appointment</button>

            <div id="contactReminderWrap" class="reminder-wrap" hidden>
              <button id="contactReminderBtn" class="reminder-btn" type="button">
                <i class="fa fa-bell"></i>
                <span id="contactReminderText">Remind me to contact</span>
              </button>
            </div>

            <div id="contactReminderLockedWrap" class="reminder-wrap" hidden>
              <button id="contactReminderLockedBtn" class="reminder-btn reminder-pro-btn" type="button">
                <span id="contactReminderLockedText">Remind me to contact</span>
                <span class="inline-pro-tag">PRO</span>
              </button>
            </div>

            <div class="social-grid">
              <button id="facebookBtn" class="social-btn facebook-hover" type="button"><i class="fa-brands fa-facebook-f"></i> Facebook</button>
              <button id="linkedinBtn" class="social-btn linkedin-hover" type="button"><i class="fa-brands fa-linkedin-in"></i> LinkedIn</button>
              <button id="instagramBtn" class="social-btn instagram-hover" type="button"><i class="fa-brands fa-instagram"></i> Instagram</button>
              <button id="tiktokBtn" class="social-btn tiktok-hover" type="button"><i class="fa-brands fa-tiktok"></i> TikTok</button>
              <button id="xBtn" class="social-btn x-hover" type="button"><i class="fa-brands fa-x-twitter"></i> X</button>
              <button id="youtubeBtn" class="social-btn youtube-hover" type="button"><i class="fa-brands fa-youtube"></i> YouTube</button>
            </div>

            <footer class="popup-footer popup-footer-actions">
              <button id="backBtn" class="footer-back-btn" type="button"><i class="fa fa-arrow-left"></i> Back</button>

<div id="analyticsPanel" class="analytics-panel" hidden>
  <div class="analytics-item">
    <span class="analytics-label">Profile Accessed</span>
    <span id="profileAccessCount" class="analytics-value">0</span>
  </div>
  <div class="analytics-item">
    <span class="analytics-label">Resume Viewed</span>
    <span id="resumeViewedCount" class="analytics-value">0</span>
  </div>
  <div class="analytics-item">
    <span class="analytics-label">Resume Downloaded</span>
    <span id="resumeDownloadedCount" class="analytics-value">0</span>
  </div>
  <div class="analytics-item">
    <span class="analytics-label" aria-hidden="true">&nbsp;</span>
    <span id="resumeAccessCode" class="analytics-value"></span>
  </div>
</div>

              <div class="footer-action-row compact-actions">
                <a id="applyVcardLink" class="footer-action-btn" href="https://smartcardlink-public.onrender.com/client-form.html" target="_blank" rel="noopener noreferrer">
                  <i class="fa fa-id-card"></i> Apply vCard
                </a>
                <button id="shareApplyBtn" class="footer-action-btn" type="button">
                  <i class="fa fa-share-nodes"></i> Share
                </button>
                <button id="analyticsBtn" class="footer-action-btn analytics-lock-btn" type="button">
                  <span class="analytics-btn-content">
                    <i class="fa fa-lock lock-icon"></i>
                    <span>View Analytics</span>
                    <span id="analyticsProTag" class="inline-pro-tag">PRO</span>
                  </span>
                </button>
              </div>
            </footer>
          </div>
        </div>
      </section>
    </main>

    <div id="resumeAccessModal" class="access-modal" hidden aria-hidden="true">
      <div class="access-card">
        <div class="access-title">Resume Access</div>
        <div class="access-subtitle">Enter access password</div>
        <input id="resumeAccessInput" class="access-input" type="password" inputmode="numeric" maxlength="4" placeholder="4-digit password" />
        <div id="resumeAccessError" class="access-error" hidden></div>
        <div class="access-actions">
          <button id="resumeAccessCancelBtn" class="access-btn secondary" type="button">Cancel</button>
          <button id="resumeAccessConfirmBtn" class="access-btn" type="button">Continue</button>
        </div>
      </div>
    </div>

    <div id="analyticsAccessModal" class="access-modal" hidden aria-hidden="true">
      <div class="access-card">
        <div class="access-title">Access Token</div>
        <div class="access-subtitle">Enter token to continue</div>
        <input id="analyticsAccessInput" class="access-input" type="text" placeholder="Paste access token" />
        <div id="analyticsAccessError" class="access-error" hidden></div>
        <div class="access-actions">
          <button id="analyticsAccessCancelBtn" class="access-btn secondary" type="button">Cancel</button>
          <button id="analyticsAccessConfirmBtn" class="access-btn" type="button">Continue</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/vcard.js" defer fetchpriority="high"></script>
</body>
</html>
